<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div id="tela-login" class="tela-formulario">
            <div class="d-flex flex-column align-items-center">
            <h1>Login</h1>
                <div id="campos-login" class="grid text-center">
                        <form id="form-login" class="p-4 border rounded shadow text-center">
                            <input class="form-control mb-2" type="email" placeholder="Email" id="email">
                            <input class="form-control mb-2" type="password" placeholder="Senha" id="senha">
                            <button class="btn btn-primary" type="submit">Login</button>
                            <div id="feedback-login"></div>
                            <p class="mt-3">Não tem conta? 
                                <a href="criar-conta.html">Criar conta</a>
                            </p>
                        </form>
                </div>
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
</body>
</html>
