<!DOCTYPE html>
<html>
<head>
    <title>Criar Estabelecimento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
    <body class="container mt-5">
        
        <h1>oCriar novo estabelecimento</h1>

        <form id="formEstabelecimento">
            
        <input class="form-control mb-2" type="text" placeholder="Nome do estabelecimento" id="nome">
        <input class="form-control mb-2" type="text" placeholder="Serviço" id="produto">
        <input class="form-control mb-2" type="text" placeholder="Telefone" id="telefone">
        <input class="form-control mb-2" type="text" placeholder="E-mail do estabelecimento" id="email">
        <input class="form-control mb-2" type="text" placeholder="Rua" id="rua">
        <input class="form-control mb-2" type="text" placeholder="Número" id="numero">
        <input class="form-control mb-2" type="text" placeholder="Bairro" id="bairro">
        <input class="form-control mb-2" type="text" placeholder="Cidade" id="cidade">
        <input class="form-control mb-2" type="text" placeholder="Estado" id="estado">
        <input class="form-control mb-2" type="text" placeholder="ID PROPRIETARIO/ TESTE" id="proprietario">
        <button class="btn btn-primary" type="submit">Cadastrar</button>

        </form>

        <script src="script.js"></script>
    </body>
</html>
