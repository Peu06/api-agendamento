<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estabelecimento</title>
    <link rel="stylesheet" href="style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 id="nomeEstabelecimento">Carregando...</h1>
        <p><strong>Produto:</strong> <span id="produtoEstabelecimento"></span></p>
        <p><strong>Telefone:</strong> <span id="telefoneEstabelecimento"></span></p>
        <p><strong>Email:</strong> <span id="emailEstabelecimento"></span></p>
        <p><strong>Endereço:</strong> <span id="enderecoEstabelecimento"></span></p>
        <p><strong>Proprietário:</strong> <span id="proprietarioEstabelecimento"></span></p>

        <button class="btn btn-primary mt-3" id="agendarBtn">Agendar</button>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
