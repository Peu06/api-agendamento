<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criando conta</title>
    <link rel="stylesheet" href="style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div id="tela-criar-conta" class="tela-formulario">
            <div class="d-flex flex-column align-items-center">
            <h1>Criar conta</h1>
            <div id="campos-criar-conta" class="grid text-center">
                <!-- Feedback -->
                    <div id="feedback-conta" class="mb-3"></div>
                        <form id="form-criar-conta" class="p-4 border rounded shadow text-start" style="max-width: 400px;">

                            <div class="row mb-3 align-items-center">
                                <div class="col-4">
                                    <label for="nome" class="col-form-label">NOME:*</label>
                                </div>
                                <div class="col-8">
                                    <input class="form-control" type="text" placeholder="Nome" id="nome" required>
                                </div>
                            </div>
                            <div class="row mb-3 align-items-center">
                                <div class="col-4">
                                    <label for="email" class="col-form-label" >EMAIL:*</label>
                                </div>
                                <div class="col-8">
                                    <input class="form-control" type="email" placeholder="Email" id="email" required>
                                </div>
                            </div>

                            <div class="row mb-3 align-items-center">
                                <div class="col-4">
                                    <label for="senha" class="col-form-label">SENHA:*</label>
                                </div>
                                <div class="col-8">
                                    <input class="form-control" type="password" placeholder="Senha" id="senha" required>
                                </div>
                            </div>

                            <div class="row mb-3 align-items-center">
                                <div class="col-4">
                                    <label for="dtNascimento" class="col-form-label">NASCIMENTO:</label>
                                </div>
                                <div class="col-8">
                                    <input class="form-control" type="date" id="dtNascimento">
                                </div>
                            </div>

                            <div class="row mb-3 align-items-center">
                                <div class="col-4">
                                    <label for="telefone" class="col-form-label">TELEFONE:*</label>
                                </div>
                                <div class="col-8">
                                    <input class="form-control" type="text" placeholder="Telefone" id="telefone" required>
                                </div>
                            </div>

                            <div class="row mb-3 align-items-center">
                                <div class="col-4">
                                    <label for="cpf" class="col-form-label">CPF:*</label>
                                </div>
                                <div class="col-8">
                                    <input class="form-control" type="text" placeholder="CPF" id="cpf" required>
                                </div>
                            </div>

                            <button class="btn btn-primary w-100" type="submit">Criar</button><br>
                            <a href="login.html" class="btn btn-secondary mt-3 w-30">Voltar</a>
                        </form> 
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
</body>
</html>
